# Signet Document Type Registry
# Version: 1.0.0
# Maintained separately from the protocol spec.
# Adding a new country or document type does not require a protocol revision.
#
# Referenced by: spec/protocol.md §24.6
# Used by: family-app (document entry forms), protocol library (nullifier computation)
#
# Nullifier computation (spec §20.7):
#   nullifier = SHA-256(
#     LP(document_type) || LP(country_code) || LP(document_number) || LP("signet-nullifier-v2")
#   )
#   where LP(x) = uint16be(len(x)) || x
#
# nullifier_fields lists the three semantic slot values [docType, country, docNumber].
# The domain tag "signet-nullifier-v2" is always appended by the library — do not include it here.
#
# number_changes_on_renewal: true  — a new document means a new nullifier (new number)
# number_changes_on_renewal: false — the same number persists across renewals (stable nullifier)
#
# Field key namespaces:
#   signet:  — universal fields defined by the Signet protocol
#   <cc>:    — country-specific fields (lowercase ISO 3166-1 alpha-2, e.g. gb:, us:, in:)

version: "1.0.0"
updated: "2026-03-16"

# ---------------------------------------------------------------------------
# Universal fields — present (with these exact keys) across all document types
# ---------------------------------------------------------------------------
universal_fields:
  - key: "signet:name"
    label: "Full name"
    required: true
  - key: "signet:dateOfBirth"
    label: "Date of birth"
    required: true

# ---------------------------------------------------------------------------
# Countries
# ---------------------------------------------------------------------------
