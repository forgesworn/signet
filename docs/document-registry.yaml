# ---------------------------------------------------------------------------
# eIDAS integration note (spec §20.10)
# ---------------------------------------------------------------------------
# When a subject presents an eIDAS wallet credential (EU citizens only),
# the verifier MAY compute an additional nullifier:
#
#   nullifier_eidas = SHA-256(LP("eidas") || LP(eidas_unique_id) || LP("signet-nullifier-v2"))
#
# This uses only two data fields (no country slot) since the eIDAS unique
# person identifier is already globally scoped. This nullifier is added to
# the nullifier family alongside any document-based nullifiers above.
# EU countries with eIDAS-eligible documents: DE, FR, IT, ES, PL (and all
# other EU member states when their national eIDAS 2.0 wallets go live).
