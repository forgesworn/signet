    documents:

      passport:
        label: "Passport"
        fields:
          - { key: "signet:name",           label: "Full name",        required: true  }
          - { key: "signet:dateOfBirth",     label: "Date of birth",    required: true  }
          - { key: "signet:nationality",     label: "Nationality",      required: true  }
          - { key: "signet:documentNumber",  label: "Passport number",  required: true  }
          - { key: "signet:documentExpiry",  label: "Expiry date",      required: true  }
          - { key: "signet:documentIssued",  label: "Issue date",       required: false }
          - { key: "signet:placeOfBirth",    label: "Place of birth",   required: false }
        nullifier_fields: ["passport", "GB", "signet:documentNumber"]
        number_changes_on_renewal: true

      driving_licence:
        label: "Driving Licence"
        fields:
          - { key: "signet:name",           label: "Full name",                    required: true  }
          - { key: "signet:dateOfBirth",     label: "Date of birth",                required: true  }
          - { key: "signet:documentNumber",  label: "Licence number",               required: true  }
          - { key: "signet:documentExpiry",  label: "Expiry date",                  required: true  }
          - { key: "signet:address",         label: "Address",                      required: false }
          - { key: "gb:dvlaCategories",      label: "Driving categories",           required: false }
        nullifier_fields: ["driving_licence", "GB", "signet:documentNumber"]
        # UK driving licence number encodes name and DOB; it does NOT change on renewal
        # (the encoded number persists unless the name or DOB changes)
        number_changes_on_renewal: false

      national_insurance_card:
        label: "National Insurance Card"
